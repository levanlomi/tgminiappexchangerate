<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VND Converter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .vnds-card {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2c);
        }
        /* Убираем стрелочки у input type="number" */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-6 text-center">Конвертер донгов</h1>
        
        <div class="vnds-card p-5 rounded-2xl mb-6 shadow-xl border border-gray-700/50">
            <label class="block text-xs font-medium opacity-50 uppercase tracking-wider mb-2">Сумма в VND (Вьетнам)</label>
            <input type="number" id="vndInput" placeholder="0" 
                class="w-full bg-transparent text-4xl font-bold border-b border-gray-600 focus:outline-none focus:border-blue-500 transition-colors">
            
            <div class="flex gap-2 mt-6">
                <button onclick="addValue(10000)" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl text-sm font-semibold transition-all">+10k</button>
                <button onclick="addValue(100000)" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl text-sm font-semibold transition-all">+100k</button>
                <button onclick="addValue(1000000)" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl text-sm font-semibold transition-all">+1M</button>
            </div>
        </div>

        <div class="space-y-4">
            <div class="vnds-card p-5 rounded-2xl flex justify-between items-center border border-gray-700/50">
                <div>
                    <span class="block text-xs opacity-50 uppercase font-medium">В рублях</span>
                    <span id="resRub" class="text-2xl font-bold text-blue-400">0</span>
                </div>
                <span class="text-2xl">🇷🇺</span>
            </div>
            <div class="vnds-card p-5 rounded-2xl flex justify-between items-center border border-gray-700/50">
                <div>
                    <span class="block text-xs opacity-50 uppercase font-medium">В долларах</span>
                    <span id="resUsd" class="text-2xl font-bold text-green-400">0</span>
                </div>
                <span class="text-2xl">🇺🇸</span>
            </div>
        </div>

        <button onclick="clearAll()" class="w-full mt-8 py-3 text-gray-500 font-medium hover:text-red-400 transition-colors">Очистить всё</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // --- НАСТРОЙКИ ---
        const API_KEY = '6f1d27cd1bdd8ad495997f7f';
        let rates = { RUB: 0, USD: 0 };

        // Функция загрузки курсов
        async function fetchRates() {
            try {
                const response = await fetch(`https://v6.exchangerate-api.com/v6/${API_KEY}/latest/VND`);
                const data = await response.json();
                if (data.result === "success") {
                    rates.RUB = data.conversion_rates.RUB;
                    rates.USD = data.conversion_rates.USD;
                    console.log("Курсы обновлены:", rates);
                }
            } catch (error) {
                console.error("Ошибка при получении курсов:", error);
            }
        }

        // Логика пересчета
        function convert() {
            const vnd = parseFloat(document.getElementById('vndInput').value) || 0;
            const rubResult = (vnd * rates.RUB).toLocaleString('ru-RU', { maximumFractionDigits: 0 });
            const usdResult = (vnd * rates.USD).toLocaleString('en-US', { maximumFractionDigits: 2 });

            document.getElementById('resRub').innerText = rubResult;
            document.getElementById('resUsd').innerText = usdResult;
        }

        // Слушатель ввода
        document.getElementById('vndInput').addEventListener('input', convert);

        function addValue(amount) {
            const input = document.getElementById('vndInput');
            input.value = (parseInt(input.value) || 0) + amount;
            convert();
        }

        function clearAll() {
            document.getElementById('vndInput').value = '';
            convert();
        }

        // Запускаем обновление курсов при старте
        fetchRates();
    </script>
</body>
</html>
