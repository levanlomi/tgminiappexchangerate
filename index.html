<html lang="ru">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Currency Converter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --app-height: var(--tg-viewport-stable-height, 100dvh);
            --gap-section: clamp(0.5rem, 1.6dvh, 0.875rem);
            --gap-cards: clamp(0.35rem, 1.1dvh, 0.65rem);
            --pad-card: clamp(0.65rem, 2dvh, 1rem);
            --radius-card: clamp(0.75rem, 2dvh, 1rem);
            --text-label: clamp(0.65rem, 1.6dvh, 0.8rem);
            --text-input: clamp(1.85rem, 5.8dvh, 2.75rem);
            --text-result: clamp(1.15rem, 3.6dvh, 1.65rem);
            --text-meta: clamp(0.55rem, 1.4dvh, 0.7rem);
            --text-btn: clamp(0.8rem, 2dvh, 0.95rem);
            --flag-header: clamp(1.65rem, 4.8dvh, 2.25rem);
            --flag-result: clamp(1.5rem, 4.2dvh, 2rem);
        }

        body {
            /* Базовые цвета из Telegram */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            margin: 0;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: var(--app-height);
            max-height: var(--app-height);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: max(0.85rem, calc(env(safe-area-inset-top) + 0.4rem)) clamp(0.85rem, 3vw, 1.1rem) max(0.65rem, env(safe-area-inset-bottom));
            box-sizing: border-box;
        }

        .app-header {
            flex-shrink: 0;
            margin-bottom: var(--gap-section);
        }

        .input-card {
            flex-shrink: 0;
            margin-bottom: var(--gap-section);
            padding: var(--pad-card);
            border-radius: var(--radius-card);
        }

        .input-label {
            font-size: var(--text-label);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
            color: var(--tg-theme-hint-color, inherit);
            opacity: 0.5;
        }

        .amount-input {
            width: 100%;
            background: transparent;
            font-size: var(--text-input);
            font-weight: 700;
            line-height: 1.1;
            padding-bottom: 0.25rem;
        }

        .zero-row {
            display: flex;
            gap: var(--gap-cards);
            margin-top: clamp(0.5rem, 1.6dvh, 0.85rem);
        }

        .zero-btn {
            flex: 1;
            padding: clamp(0.55rem, 1.8dvh, 0.8rem) 0.5rem;
            border-radius: var(--radius-card);
            font-size: var(--text-btn);
            font-weight: 600;
        }

        .results-list {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            gap: var(--gap-cards);
            min-height: 0;
        }

        .result-card {
            flex: 1 1 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(0.45rem, 1.4dvh, 0.75rem) var(--pad-card);
            border-radius: var(--radius-card);
            min-height: clamp(2.75rem, 8dvh, 4rem);
        }

        .result-label {
            display: block;
            font-size: var(--text-label);
            font-weight: 500;
            text-transform: uppercase;
            opacity: 0.5;
            color: var(--tg-theme-hint-color, inherit);
            margin-bottom: 0.15rem;
        }

        .result-value {
            font-size: var(--text-result);
            font-weight: 700;
            line-height: 1.1;
        }

        .result-flag {
            font-size: var(--flag-result);
            line-height: 1;
            opacity: 0.9;
        }

        .app-footer {
            flex-shrink: 0;
            margin-top: var(--gap-section);
        }

        .last-update {
            margin-bottom: clamp(0.35rem, 1.2dvh, 0.6rem);
            text-align: center;
            font-size: var(--text-meta);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.3;
        }

        .clear-btn {
            width: 100%;
            padding: clamp(0.7rem, 2.2dvh, 0.95rem) 0.5rem;
            border-radius: var(--radius-card);
            font-size: var(--text-btn);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ПРИНУДИТЕЛЬНАЯ СВЕТЛАЯ ТЕМА */
        body.theme-light {
            --tg-theme-bg-color: #ffffff !important;
            --tg-theme-text-color: #000000 !important;
            --tg-theme-secondary-bg-color: #f3f4f6 !important;
            --tg-theme-hint-color: #9ca3af !important;
        }

        /* ПРИНУДИТЕЛЬНАЯ ТЕМНАЯ ТЕМА */
        body.theme-dark {
            --tg-theme-bg-color: #1a1a1a !important;
            --tg-theme-text-color: #ffffff !important;
            --tg-theme-secondary-bg-color: #2c2c2c !important;
            --tg-theme-hint-color: #9ca3af !important;
        }

        .vnds-card {
            background-color: var(--tg-theme-secondary-bg-color, #f3f4f6);
            border: 1px solid var(--tg-theme-hint-color, rgba(0,0,0,0.1));
        }
        .currency-btn {
            font-size: var(--flag-header);
            line-height: 1;
            padding: clamp(0.35rem, 1.2dvh, 0.55rem) clamp(0.4rem, 1.4dvh, 0.6rem);
            border-radius: clamp(0.7rem, 2dvh, 0.95rem);
            border: 2px solid transparent;
            background: var(--tg-theme-secondary-bg-color, rgba(0,0,0,0.05));
            transition: all 0.15s ease;
        }
        .currency-btn.active {
            border-color: var(--tg-theme-button-color, #3b82f6);
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .zero-btn {
            background-color: var(--tg-theme-button-color, #3b82f6);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
        }
        .zero-btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
        .clear-btn {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .clear-btn:active {
            background-color: rgba(239, 68, 68, 0.2);
            transform: scale(0.98);
        }
        .base-selector {
            display: flex;
            gap: clamp(0.45rem, 1.5dvh, 0.75rem);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .custom-input {
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
            color: var(--tg-theme-text-color, #000000);
        }
        .custom-input:focus {
            border-bottom-color: var(--tg-theme-button-color, #3b82f6);
            outline: none;
        }
        
        /* Кнопка смены темы (оптимизирована под тапы без hover) */
        .theme-toggle-btn {
            color: var(--tg-theme-text-color, #000000);
            opacity: 0.4;
            transition: all 0.2s ease;
        }
        .theme-toggle-btn:active {
            opacity: 1;
            transform: scale(0.92) rotate(-15deg);
        }
    </style>
</head>
<body>
    <div class="app-shell max-w-md mx-auto w-full">
        
        <div class="app-header relative flex justify-start items-center">
            <div class="base-selector" id="baseSelector">
                <button onclick="switchCurrency('VND')" id="btn-VND" class="currency-btn active">🇻🇳</button>
                <button onclick="switchCurrency('RUB')" id="btn-RUB" class="currency-btn">🇷🇺</button>
                <button onclick="switchCurrency('USD')" id="btn-USD" class="currency-btn">🇺🇸</button>
                <button onclick="switchCurrency('KZT')" id="btn-KZT" class="currency-btn">🇰🇿</button>
                <button onclick="switchCurrency('CNY')" id="btn-CNY" class="currency-btn">🇨🇳</button>
            </div>
            
            <button onclick="toggleTheme()" class="theme-toggle-btn absolute right-0 p-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
            </button>
        </div>

        <div class="vnds-card input-card shadow-xl transition-all">
            <label id="inputLabel" class="input-label"></label>
            <input type="text" id="amountInput" inputmode="numeric" placeholder="0" 
                class="amount-input custom-input transition-colors rounded-none">
            
            <div class="zero-row">
                <button type="button" onclick="addZeros('000')" class="zero-btn transition-all">,000</button>
                <button type="button" onclick="addZeros('000000')" class="zero-btn transition-all">,000,000</button>
            </div>
        </div>

        <div id="results" class="results-list"></div>

        <div class="app-footer">
            <div id="lastUpdate" class="last-update"></div>
            <button onclick="clearAll()" id="clearBtn" class="clear-btn transition-all"></button>
        </div>
        
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function updateAppHeight() {
            const height = tg.viewportStableHeight || window.innerHeight;
            document.documentElement.style.setProperty('--app-height', `${height}px`);
        }

        updateAppHeight();
        tg.onEvent('viewportChanged', updateAppHeight);
        window.addEventListener('resize', updateAppHeight);

        // --- СЛОВАРЬ ЛОКАЛИЗАЦИИ ---
        const userLang = tg.initDataUnsafe?.user?.language_code === 'en' ? 'en' : 'ru';
        
        const i18n = {
            ru: {
                amount: 'Сумма',
                clearAll: 'Очистить всё',
                loading: 'Обновление данных...',
                updated: 'Курс обновлен',
                at: 'в',
                offline: 'Офлайн',
                noData: 'Нет сети и сохраненных данных 😔',
                currencies: {
                    VND: 'В донгах',
                    RUB: 'В рублях',
                    USD: 'В долларах',
                    KZT: 'В тенге',
                    CNY: 'В юанях'
                }
            },
            en: {
                amount: 'Amount',
                clearAll: 'Clear All',
                loading: 'Updating data...',
                updated: 'Rates updated',
                at: 'at',
                offline: 'Offline',
                noData: 'No network and no cached data 😔',
                currencies: {
                    VND: 'In Dong',
                    RUB: 'In Rubles',
                    USD: 'In Dollars',
                    KZT: 'In Tenge',
                    CNY: 'In Yuan'
                }
            }
        };

        const currentText = i18n[userLang];

        const amountInput = document.getElementById('amountInput');
        const resultsEl = document.getElementById('results');
        const lastUpdateEl = document.getElementById('lastUpdate');
        const clearBtn = document.getElementById('clearBtn');
        
        let baseCurrency = 'VND';
        let rates = { VND: 1, RUB: 0, USD: 0, KZT: 0, CNY: 0 };
        const API_KEY = '6f1d27cd1bdd8ad495997f7f'; 

        const CURRENCIES = {
            VND: { label: currentText.currencies.VND, flag: '🇻🇳', color: 'text-yellow-500' },
            RUB: { label: currentText.currencies.RUB, flag: '🇷🇺', color: 'text-blue-500' },
            USD: { label: currentText.currencies.USD, flag: '🇺🇸', color: 'text-green-500' },
            KZT: { label: currentText.currencies.KZT, flag: '🇰🇿', color: 'text-teal-500' },
            CNY: { label: currentText.currencies.CNY, flag: '🇨🇳', color: 'text-red-500' }
        };

        const DISPLAY_ORDER = ['VND', 'RUB', 'USD', 'KZT', 'CNY'];

        // --- ЛОГИКА ТЕМЫ ---
        let manualTheme = localStorage.getItem('app-theme'); 
        if (!manualTheme && tg.colorScheme) {
            manualTheme = tg.colorScheme;
        }

        function applyManualTheme() {
            document.body.classList.remove('theme-light', 'theme-dark');
            if (manualTheme) {
                document.body.classList.add(`theme-${manualTheme}`);
            }
        }

        function toggleTheme() {
            if (manualTheme === 'light') {
                manualTheme = 'dark';
            } else if (manualTheme === 'dark') {
                manualTheme = 'light';
            } else {
                const bgColor = getComputedStyle(document.body).getPropertyValue('--tg-theme-bg-color').trim();
                const isLight = bgColor === '#ffffff' || document.body.style.backgroundColor === 'rgb(255, 255, 255)';
                manualTheme = isLight ? 'dark' : 'light';
            }
            
            localStorage.setItem('app-theme', manualTheme);
            applyManualTheme();
            convert(); 
        }

        applyManualTheme();

        // --- ЛОГИКА ЗАГРУЗКИ КУРСОВ (С ОФЛАЙН КЭШЕМ) ---
        async function fetchRates(base = 'VND') {
            try {
                const response = await fetch(`https://v6.exchangerate-api.com/v6/${API_KEY}/latest/${base}`);
                const data = await response.json();
                
                if (data.result === "success") {
                    rates = data.conversion_rates;
                    
                    const now = new Date();
                    const dateStr = now.toLocaleDateString(userLang === 'ru' ? 'ru-RU' : 'en-US');
                    const timeStr = now.toLocaleTimeString(userLang === 'ru' ? 'ru-RU' : 'en-US', { hour: '2-digit', minute: '2-digit' });
                    const updateText = `${currentText.updated}: ${dateStr} ${currentText.at} ${timeStr}`;
                    
                    lastUpdateEl.textContent = updateText;
                    
                    localStorage.setItem(`rates_${base}`, JSON.stringify(rates));
                    localStorage.setItem(`update_${base}`, updateText);
                    
                    convert();
                }
            } catch (e) { 
                console.error("No network, using cache:", e);
                
                const cachedRates = localStorage.getItem(`rates_${base}`);
                const cachedUpdateText = localStorage.getItem(`update_${base}`);
                
                if (cachedRates) {
                    rates = JSON.parse(cachedRates);
                    lastUpdateEl.textContent = `${cachedUpdateText} (${currentText.offline} ✈️)`;
                    convert();
                } else {
                    lastUpdateEl.textContent = currentText.noData;
                }
            }
        }

        function formatNumber(num, fractionDigits = 0) {
            return new Intl.NumberFormat('en-US', { 
                maximumFractionDigits: fractionDigits,
                minimumFractionDigits: 0
            }).format(num);
        }

        function getRawValue() {
            return amountInput.value.replace(/,/g, '');
        }

        function formatAmountInput() {
            let value = getRawValue();
            if (value === '') {
                convert();
                return;
            }
            const num = parseFloat(value);
            if (!isNaN(num)) {
                amountInput.value = formatNumber(num);
                convert();
            }
        }

        function initCards() {
            resultsEl.innerHTML = '';
            DISPLAY_ORDER.forEach(code => {
                const c = CURRENCIES[code];
                const card = document.createElement('div');
                card.id = `card-${code}`;
                card.className = 'vnds-card result-card transition-all';
                card.innerHTML = `
                    <div>
                        <span class="result-label">${c.label}</span>
                        <span id="res-${code}" class="result-value ${c.color}">0</span>
                    </div>
                    <span class="result-flag">${c.flag}</span>
                `;
                resultsEl.appendChild(card);
            });

            document.getElementById('inputLabel').textContent = `${currentText.amount} (${CURRENCIES[baseCurrency].label})`;
            clearBtn.textContent = currentText.clearAll;
            lastUpdateEl.textContent = currentText.loading;
        }

        function convert() {
            const amount = parseFloat(getRawValue()) || 0;
            DISPLAY_ORDER.forEach(code => {
                const el = document.getElementById(`res-${code}`);
                const card = document.getElementById(`card-${code}`);
                
                if (el && card) {
                    let resultValue;
                    if (code === baseCurrency) {
                        resultValue = amount;
                        card.style.opacity = "1";
                        card.style.borderColor = "var(--tg-theme-button-color, #3b82f6)";
                        card.style.background = "rgba(59, 130, 246, 0.05)";
                    } else {
                        resultValue = amount * (rates[code] || 0);
                        card.style.opacity = "0.8";
                        card.style.borderColor = "var(--tg-theme-hint-color, rgba(0,0,0,0.1))";
                        card.style.background = "var(--tg-theme-secondary-bg-color, #f3f4f6)";
                    }
                    
                    const decimals = (code === 'VND' || code === 'KZT') ? 0 : 2;
                    el.textContent = formatNumber(resultValue, decimals);
                }
            });
        }

        function switchCurrency(code) {
            if (code === baseCurrency) return;
            baseCurrency = code;
            
            DISPLAY_ORDER.forEach(c => {
                const btn = document.getElementById(`btn-${c}`);
                if (btn) btn.classList.toggle('active', c === code);
            });

            document.getElementById('inputLabel').textContent = `${currentText.amount} (${CURRENCIES[code].label})`;
            fetchRates(code);
        }

        function addZeros(zeros) {
            let current = getRawValue();
            if (current === '' || current === '0') return;
            amountInput.value = formatNumber(parseFloat(current + zeros));
            convert();
        }

        function clearAll() {
            amountInput.value = '';
            convert();
        }

        amountInput.addEventListener('input', formatAmountInput);

        // --- РЕГИСТРАЦИЯ SERVICE WORKER ДЛЯ PWA ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered successfully:', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }

        initCards();
        fetchRates(baseCurrency);
        
        tg.onEvent('themeChanged', function() {
            if (!localStorage.getItem('app-theme')) {
                manualTheme = tg.colorScheme;
                applyManualTheme();
            }
            convert();
        });
    </script>
</body>
</html>
